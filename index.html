<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Code Lens</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PGNpcmNsZSBjeD0iMjgiIGN5PSIyOCIgcj0iMTgiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzYwYTVmYSIgc3Ryb2tlLXdpZHRoPSI1Ii8+PGxpbmUgeDE9IjQxIiB5MT0iNDEiIHgyPSI1NiIgeTI9IjU2IiBzdHJva2U9IiM2MGE1ZmEiIHN0cm9rZS13aWR0aD0iNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PHRleHQgeD0iMTkiIHk9IjM1IiBmb250LWZhbWlseT0ibW9ub3NwYWNlIiBmb250LXNpemU9IjIyIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0iIzYwYTVmYSI+Jmx0Oy8mZ3Q7PC90ZXh0Pjwvc3ZnPg==" />
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #242424;
      --ink: #e8e8e8;
      --muted: #888;
      --border: #333;
      --user-bg: #2d4a3e;
      --assistant-bg: #2d3748;
      --thinking-bg: #3d3429;
      --tool-bg: #1e1e2e;
      --system-bg: #2a2a2a;
      --accent: #60a5fa;
      --user-accent: #4ade80;
      --assistant-accent: #818cf8;
      --thinking-accent: #fbbf24;
      --tool-accent: #f472b6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.5;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }
    .filter-group {
      display: flex;
      gap: 4px;
    }
    .filter-btn {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
    }
    .input-section {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .input-section.collapsed {
      padding: 8px 24px;
    }
    .input-section.collapsed textarea {
      display: none;
    }
    .input-section.collapsed .controls {
      margin-top: 0;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
      background: var(--panel);
      color: var(--ink);
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: var(--border);
    }
    button.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }
    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
    }
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }
    .entry {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
    }
    .entry.hidden {
      display: none;
    }
    .entry-user {
      background: var(--user-bg);
      border-left: 3px solid var(--user-accent);
    }
    .entry-assistant {
      background: var(--assistant-bg);
      border-left: 3px solid var(--assistant-accent);
    }
    .entry-thinking {
      background: var(--thinking-bg);
      border-left: 3px solid var(--thinking-accent);
      opacity: 0.85;
    }
    .entry-tool {
      background: var(--tool-bg);
      border-left: 3px solid var(--tool-accent);
    }
    .entry-system {
      background: var(--system-bg);
      border-left: 3px solid var(--muted);
      opacity: 0.7;
    }
    .entry-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      user-select: none;
    }
    .entry-header:hover {
      background: rgba(255,255,255,0.03);
    }
    .entry.collapsed .entry-content,
    .entry.collapsed .agent-prompt,
    .entry.collapsed .metadata-toggle,
    .entry.collapsed .metadata-content {
      display: none;
    }
    .entry.collapsed .entry-header {
      border-bottom: none;
    }
    .collapse-indicator {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .entry-header:hover .collapse-indicator {
      opacity: 0.6;
    }
    .copy-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .entry-header:hover .copy-btn {
      opacity: 0.7;
    }
    .copy-btn:hover {
      opacity: 1 !important;
      background: rgba(255,255,255,0.1);
      color: var(--ink);
    }
    .copy-btn.copied {
      color: #4ade80;
      border-color: #4ade80;
    }
    .role-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .role-user { color: var(--user-accent); }
    .role-assistant { color: var(--assistant-accent); }
    .role-thinking { color: var(--thinking-accent); }
    .role-tool { color: var(--tool-accent); }
    .role-system { color: var(--muted); }
    .entry-meta {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }
    .entry-content {
      padding: 14px;
    }
    .message-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-text code {
      background: rgba(0,0,0,0.3);
      padding: 2px 5px;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
    }
    .message-text pre {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-text pre code {
      background: none;
      padding: 0;
    }
    .content-block {
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
    }
    .content-block:first-child {
      margin-top: 0;
    }
    .block-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .tool-call {
      border: 1px solid var(--tool-accent);
      border-radius: 6px;
      margin-top: 8px;
    }
    .tool-call:first-child {
      margin-top: 0;
    }
    .tool-header {
      padding: 8px 12px;
      background: rgba(244, 114, 182, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .tool-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--tool-accent);
    }
    .tool-id {
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }
    .tool-body {
      padding: 10px 12px;
      font-size: 13px;
      border-top: 1px solid rgba(244, 114, 182, 0.2);
    }
    .tool-body.collapsed {
      display: none;
    }
    .tool-input {
      background: rgba(0,0,0,0.2);
      padding: 8px;
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      white-space: pre;
      word-break: normal;
      overflow-x: auto;
    }
    .tool-input.wrap {
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: hidden;
    }
    .wrap-toggle {
      font-size: 10px;
      padding: 1px 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 3px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .entry-header:hover .wrap-toggle {
      opacity: 0.7;
    }
    .wrap-toggle:hover {
      opacity: 1 !important;
      background: rgba(255,255,255,0.1);
    }
    .wrap-toggle.active {
      color: var(--accent);
      border-color: var(--accent);
    }
    .tool-result {
      margin-top: 8px;
    }
    .tool-result-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .diff-file { color: var(--muted); margin-bottom: 4px; }
    .diff-del { background: rgba(248, 113, 113, 0.15); color: #f87171; }
    .diff-add { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .thinking-text {
      font-size: 13px;
      font-style: italic;
      color: #d4c5a9;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .metadata-toggle {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .metadata-toggle:hover {
      color: var(--ink);
    }
    .metadata-content {
      padding: 10px 14px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      background: rgba(0,0,0,0.2);
      display: none;
    }
    .metadata-content.show {
      display: block;
    }
    .metadata-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    .metadata-key {
      color: var(--muted);
      min-width: 120px;
    }
    .metadata-value {
      color: var(--ink);
      word-break: break-all;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
    }
    .subagent-info {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(129, 140, 248, 0.2);
      border-radius: 4px;
      font-size: 11px;
      color: var(--assistant-accent);
    }
    /* Agent result styling */
    .entry-agent {
      background: linear-gradient(135deg, #1e293b 0%, #1e1e2e 100%);
      border-left: 3px solid #22d3ee;
    }
    .role-agent {
      color: #22d3ee;
    }
    .agent-id {
      font-size: 11px;
      color: #22d3ee;
      font-family: ui-monospace, monospace;
      background: rgba(34, 211, 238, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .agent-stats {
      font-size: 11px;
      color: var(--muted);
    }
    .agent-prompt {
      padding: 10px 14px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .agent-prompt-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .agent-prompt-text {
      font-size: 13px;
      color: #94a3b8;
      white-space: pre-wrap;
    }
    .agent-result-text {
      font-size: 14px;
      word-break: break-word;
      line-height: 1.6;
    }
    .agent-result-text h2, .agent-result-text h3, .agent-result-text h4 {
      margin: 16px 0 8px 0;
      color: #e2e8f0;
    }
    .agent-result-text h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .agent-result-text h3 { font-size: 16px; }
    .agent-result-text h4 { font-size: 14px; color: var(--muted); }
    .agent-result-text pre {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .agent-result-text code {
      font-family: ui-monospace, monospace;
      font-size: 13px;
    }
    .agent-result-text pre code {
      background: none;
    }
    .agent-result-text a {
      color: var(--accent);
      text-decoration: underline;
    }
    .agent-result-text li {
      margin-left: 20px;
      margin-bottom: 4px;
    }
    .agent-result-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .agent-result-text strong {
      color: #f1f5f9;
    }
    .agent-result-text table {
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
      width: max-content;
      min-width: 100%;
      display: block;
      overflow-x: auto;
    }
    .agent-result-text th, .agent-result-text td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
    }
    .agent-result-text th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
      color: #e2e8f0;
    }
    .agent-result-text tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }
    /* Session browser */
    .session-browser {
      flex: 1;
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }
    .session-browser.active {
      display: flex;
    }
    .session-search {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .session-search input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
    }
    .session-search input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px;
    }
    .session-card {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      background: var(--panel);
    }
    .session-card:hover {
      border-color: var(--accent);
      background: rgba(96, 165, 250, 0.05);
    }
    .session-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-detail {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta-row {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }
    .live-dot {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4ade80;
      font-weight: 600;
    }
    .live-dot.active {
      display: flex;
    }
    .live-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #backBtn { display: none; }
    .session-empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }
    /* Bash tool call */
    .bash-command {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.3);
      padding: 10px 12px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #e2e8f0;
    }
    .bash-description {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }
    /* Skill entries */
    .entry-skill {
      background: linear-gradient(135deg, #1e2a3a 0%, #1a2535 100%);
      border-left: 3px solid #a78bfa;
      opacity: 0.75;
    }
    .role-skill {
      color: #a78bfa;
    }
    .skill-name {
      font-size: 11px;
      color: #a78bfa;
      font-family: ui-monospace, monospace;
      background: rgba(167, 139, 250, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
    }
    /* Bookmarks */
    .bookmark-star {
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .bookmark-star:hover {
      color: #fbbf24;
    }
    .bookmark-star.active {
      color: #fbbf24;
    }
    .session-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .session-title-row .session-title {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }
    .session-search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .session-search-row input {
      flex: 1;
    }
    .saved-filter-btn {
      padding: 8px 14px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .saved-filter-btn:hover {
      border-color: #fbbf24;
      color: #fbbf24;
    }
    .saved-filter-btn.active {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border-color: #fbbf24;
    }
    .viewer-bookmark {
      cursor: pointer;
      font-size: 18px;
      color: var(--muted);
      transition: color 0.15s;
    }
    .viewer-bookmark:hover {
      color: #fbbf24;
    }
    .viewer-bookmark.active {
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <header>
    <button id="backBtn" onclick="showSessionList()">&#8592; Sessions</button>
    <h1><span onclick="showSessionList()" style="cursor: pointer;">Claude Code Lens</span> <span id="sessionTitle" style="font-size: 0.6em; opacity: 0.5;"></span></h1>
    <span class="viewer-bookmark" id="viewerBookmark" style="display:none" onclick="toggleViewerBookmark()" title="Bookmark this session">&#9734;</span>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="conversation">Chat</button>
      <button class="filter-btn" data-filter="tools">Tools</button>
      <button class="filter-btn" data-filter="thinking">Thinking</button>
    </div>
    <div class="live-dot" id="liveDot">LIVE</div>
    <div class="header-controls">
      <button onclick="outputEl.scrollTo({top: 0, behavior: 'smooth'})">Top</button>
      <button onclick="outputEl.scrollTo({top: outputEl.scrollHeight, behavior: 'smooth'})">Bottom</button>
      <button id="toggleInput">Hide Input</button>
      <button onclick="restartServer()" title="Restart server">&#x21bb;</button>
    </div>
  </header>

  <main>
    <section class="session-browser" id="sessionBrowser">
      <div class="session-search">
        <div class="session-search-row">
          <input type="search" id="sessionSearch" placeholder="Search sessions..." oninput="filterSessions()" />
          <button class="saved-filter-btn" id="savedFilterBtn" onclick="toggleSavedFilter()">&#9733; Saved</button>
        </div>
      </div>
      <div class="session-list" id="sessionList">
        <div class="session-empty">Loading sessions...</div>
      </div>
    </section>

    <section class="input-section" id="inputSection">
      <textarea id="input" placeholder="Paste JSONL session data here..."></textarea>
      <div class="controls">
        <button class="primary" id="parse">Parse</button>
        <button id="clear">Clear</button>
        <span class="status" id="status"></span>
      </div>
      <div class="error" id="error"></div>
    </section>

    <section class="conversation" id="output">
      <div class="empty-state">Paste Claude Code session JSONL and click Parse</div>
    </section>
  </main>

  <script>
    const inputEl = document.getElementById('input');
    const parseBtn = document.getElementById('parse');
    const clearBtn = document.getElementById('clear');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const inputSection = document.getElementById('inputSection');
    const toggleInputBtn = document.getElementById('toggleInput');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let currentFilter = 'all';
    let parsedEntries = [];
    let showOnlyBookmarked = false;

    // Bookmark helpers
    function getBookmarks() {
      try { return JSON.parse(localStorage.getItem('bookmarks') || '[]'); }
      catch { return []; }
    }
    function isBookmarked(uid) {
      return getBookmarks().includes(uid);
    }
    function toggleBookmark(uid, event) {
      if (event) event.stopPropagation();
      const bookmarks = getBookmarks();
      const idx = bookmarks.indexOf(uid);
      if (idx === -1) bookmarks.push(uid);
      else bookmarks.splice(idx, 1);
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
      return idx === -1; // returns true if now bookmarked
    }

    // Toggle input visibility
    toggleInputBtn.addEventListener('click', () => {
      inputSection.classList.toggle('collapsed');
      toggleInputBtn.textContent = inputSection.classList.contains('collapsed') ? 'Show Input' : 'Hide Input';
    });

    // Filter buttons
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

      });

    function applyFilter() {
      document.querySelectorAll('.entry').forEach(entry => {
        const type = entry.dataset.entryType;
        let show = false;
        switch (currentFilter) {
          case 'all': show = true; break;
          case 'conversation': show = ['user', 'assistant'].includes(type); break;
          case 'tools': show = type === 'tool'; break;
          case 'thinking': show = type === 'thinking'; break;
        }
        entry.classList.toggle('hidden', !show);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMarkdownTable(tableText) {
      // Parse markdown table - input is already HTML-escaped
      const lines = tableText.trim().split('\n');
      if (lines.length < 2) return tableText;

      const parseRow = (line) => {
        // Split by | and trim, filter empty cells from edges
        return line.split('|').map(cell => cell.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1 || arr.length === 1);
      };

      const headerCells = parseRow(lines[0]);
      if (headerCells.length === 0) return tableText;

      // Check if second line is separator (contains only -, :, |, spaces)
      if (!/^[\s|:\-]+$/.test(lines[1])) return tableText;

      let html = '<table><thead><tr>';
      headerCells.forEach(cell => {
        html += '<th>' + cell + '</th>';
      });
      html += '</tr></thead><tbody>';

      for (let i = 2; i < lines.length; i++) {
        const cells = parseRow(lines[i]);
        if (cells.length === 0) continue;
        html += '<tr>';
        cells.forEach(cell => {
          html += '<td>' + cell + '</td>';
        });
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    function renderMarkdown(text) {
      // Basic markdown rendering for readability
      // SECURITY: escape HTML first to prevent XSS
      let html = escapeHtml(text);

      // Tables - process before other rules to avoid interference
      // Match table blocks: lines starting with | that have a separator row
      html = html.replace(/^(\|.+\|\n\|[\s|:\-]+\|\n(?:\|.+\|\n?)+)/gm, (match) => {
        return renderMarkdownTable(match);
      });

      // Code blocks (```...```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>');

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headers
      html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

      // Bold
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

      // Italic (but not inside URLs or already processed)
      html = html.replace(/(?<![\/\w])\*([^*]+)\*(?![\/\w])/g, '<em>$1</em>');

      // Horizontal rule
      html = html.replace(/^---$/gm, '<hr>');

      // Lists
      html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

      return html;
    }

    function formatTimestamp(ts) {
      if (!ts) return { short: '', full: '' };
      try {
        const d = new Date(ts);
        return {
          short: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
          full: d.toLocaleString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
        };
      } catch {
        return { short: String(ts), full: String(ts) };
      }
    }

    function extractText(content) {
      if (typeof content === 'string') return content;
      if (Array.isArray(content)) {
        return content
          .filter(b => b.type === 'text')
          .map(b => b.text)
          .join('\n');
      }
      return '';
    }

    function extractThinking(content) {
      if (!Array.isArray(content)) return [];
      return content.filter(b => b.type === 'thinking').map(b => b.thinking);
    }

    function extractToolUse(content) {
      if (!Array.isArray(content)) return [];
      return content.filter(b => b.type === 'tool_use');
    }

    function extractToolResult(content) {
      if (!Array.isArray(content)) return [];
      return content.filter(b => b.type === 'tool_result');
    }

    function extractToolResultText(content) {
      // tool_result content can be a string or array of {type: "text", text: "..."}
      if (typeof content === 'string') return content;
      if (Array.isArray(content)) {
        return content
          .filter(b => b.type === 'text')
          .map(b => b.text)
          .join('\n');
      }
      return JSON.stringify(content, null, 2);
    }

    function renderEditDiff(input) {
      const oldLines = (input.old_string || '').split('\n');
      const newLines = (input.new_string || '').split('\n');
      // LCS for line-level diff
      const m = oldLines.length, n = newLines.length;
      const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = oldLines[i-1] === newLines[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
      const lines = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
          lines.push(' ' + escapeHtml(oldLines[i-1]));
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
          lines.push('<span class="diff-add">+' + escapeHtml(newLines[j-1]) + '</span>');
          j--;
        } else {
          lines.push('<span class="diff-del">-' + escapeHtml(oldLines[i-1]) + '</span>');
          i--;
        }
      }
      lines.reverse();
      let header = '<span class="diff-file">' + escapeHtml(input.file_path) + (input.replace_all ? ' (replace all)' : '') + '</span>\n';
      return header + lines.join('\n');
    }

    function renderToolInput(input, toolName) {
      if (typeof input === 'string') return escapeHtml(input);
      if (toolName === 'Write' && input && input.file_path && input.content) {
        return escapeHtml(input.file_path) + '\n\n' + escapeHtml(input.content);
      }
      if (toolName === 'Edit' && input && input.file_path && input.old_string != null) {
        return renderEditDiff(input);
      }
      try {
        return escapeHtml(JSON.stringify(input, null, 2));
      } catch {
        return escapeHtml(String(input));
      }
    }

    function renderMetadata(obj) {
      const skip = ['type', 'subtype', 'message', 'content', 'timestamp', 'role'];
      const entries = Object.entries(obj).filter(([k]) => !skip.includes(k));
      if (entries.length === 0) return '';

      return entries.map(([k, v]) => {
        let val = v;
        if (typeof v === 'object') {
          try { val = JSON.stringify(v); } catch { val = String(v); }
        }
        return `<div class="metadata-row"><span class="metadata-key">${escapeHtml(k)}</span><span class="metadata-value">${escapeHtml(String(val))}</span></div>`;
      }).join('');
    }

    function classifyEntry(obj) {
      const type = obj.type;
      const subtype = obj.subtype;
      const msgRole = obj.message?.role || obj.role;
      const content = obj.content || obj.message?.content;

      // Tool result - check FIRST because these come wrapped in user messages
      if (Array.isArray(content)) {
        const toolResults = extractToolResult(content);
        if (toolResults.length > 0) {
          const agentMeta = obj.toolUseResult;
          return {
            category: 'tool',
            isResult: true,
            results: toolResults,
            agentMeta: agentMeta
          };
        }
      }

      // Skill load (isMeta user messages)
      if (obj.isMeta && (type === 'user' || msgRole === 'user')) {
        const text = extractText(content);
        // Extract skill name from "Base directory for this skill: .../skills/<name>"
        const skillMatch = text.match(/skills\/([^\s/\n]+)/);
        return { category: 'skill', content: text, skillName: skillMatch ? skillMatch[1] : null };
      }

      // User message
      if (type === 'user' || msgRole === 'user') {
        return { category: 'user', content: extractText(content) };
      }

      // Assistant message
      if (type === 'assistant' || msgRole === 'assistant') {
        const text = extractText(content);
        const thinking = extractThinking(content);
        const tools = extractToolUse(content);
        return { category: 'assistant', content: text, thinking, tools };
      }

      // System
      if (type === 'system') {
        return { category: 'system', content: extractText(content), subtype };
      }

      // File history, progress, and other meta entries - skip
      if (type === 'file-history-snapshot' || type === 'progress') {
        return { category: 'meta', type };
      }

      return { category: 'unknown', raw: obj };
    }

    function renderEntry(obj, index) {

              <span class="entry-meta" title="${escapeHtml(timestamp.full)}">${escapeHtml(timestamp.short)}</span>

      else if (classified.category === 'assistant') {

        if (classified.thinking && classified.thinking.length > 0) {

        let contentHtml = '';
        if (classified.content && classified.content.trim()) {
          contentHtml = `
            <div class="entry entry-assistant" data-entry-type="assistant">
              <div class="entry-header" onclick="toggleEntry(this)">
                <span class="role-badge role-assistant">Assistant</span>

              </div>
              ${metadata ? `<div class="metadata-toggle" onclick="toggleMeta('${entryId}', event)">+ metadata</div><div class="metadata-content" id="${entryId}-meta">${metadata}</div>` : ''}
            </div>
          `;
        }

        html = thinkingHtml + toolsHtml + contentHtml;

        // If assistant entry has no visible content but has metadata, still show it
        if (!html && metadata) {
          html = `
            <div class="entry entry-assistant" data-entry-type="assistant">
              <div class="entry-header" onclick="toggleEntry(this)">
                <span class="role-badge role-assistant">Assistant</span>

                <button class="copy-btn" onclick="copyRaw(${index}, event)">copy</button>

      }

      else if (classified.category === 'tool' && classified.isResult) {
        const agentMeta = classified.agentMeta;

        // If this is an agent result with metadata, render it specially
        if (agentMeta && agentMeta.agentId) {

          const resultContent = extractToolResultText(classified.results[0]?.content);
          const duration = agentMeta.totalDurationMs ? (agentMeta.totalDurationMs / 1000).toFixed(1) + 's' : '';
          const tokens = agentMeta.totalTokens ? agentMeta.totalTokens.toLocaleString() : '';
          const toolCount = agentMeta.totalToolUseCount || 0;
          const status = agentMeta.status || 'completed';

          html = `
            <div class="entry entry-agent" data-entry-type="tool">
              <div class="entry-header" onclick="toggleEntry(this)">

                <span class="agent-stats">${duration} · ${tokens} tokens · ${toolCount} tools</span>
                <span class="entry-meta" title="${escapeHtml(timestamp.full)}">${escapeHtml(timestamp.short)}</span>

              ${promptText ? `
              <div class="agent-prompt">
                <div class="agent-prompt-label">Prompt</div>
                <div class="agent-prompt-text">${escapeHtml(promptText)}</div>
              </div>
              ` : ''}
              <div class="entry-content">
                <div class="agent-result-text">${renderMarkdown(resultContent)}</div>
              </div>
              ${metadata ? `<div class="metadata-toggle" onclick="toggleMeta('${entryId}', event)">+ metadata</div><div class="metadata-content" id="${entryId}-meta">${metadata}</div>` : ''}
            </div>
          `;
        } else {
          // Regular tool results
          html = classified.results.map((result, ri) => {
            const resultId = `${entryId}-result-${ri}`;
            const content = extractToolResultText(result.content);
            const isError = result.is_error;
            return `
              <div class="entry entry-tool" data-entry-type="tool">
                <div class="entry-header" onclick="toggleEntry(this)">
                  <span class="role-badge role-tool">${isError ? 'Tool Error' : 'Tool Result'}</span>
                  <span class="tool-id">${escapeHtml(result.tool_use_id || '')}</span>
                  <button class="wrap-toggle" onclick="toggleWrap(this, event)">wrap</button>

                </div>
                <div class="entry-content">
                  <div class="tool-input" style="${isError ? 'color: #f87171;' : ''}">${escapeHtml(content)}</div>
                </div>
              </div>
            `;
          }).join('');
        }
      }

      else if (classified.category === 'system') {
        html = `
          <div class="entry entry-system" data-entry-type="system">
            <div class="entry-header" onclick="toggleEntry(this)">
              <span class="role-badge role-system">System${classified.subtype ? ` · ${classified.subtype}` : ''}</span>
              <span class="entry-meta" title="${escapeHtml(timestamp.full)}">${escapeHtml(timestamp.short)}</span>
              <button class="copy-btn" onclick="copyRaw(${index}, event)">copy</button>
              <span class="collapse-indicator">click to toggle</span>
            </div>
            ${classified.content ? `<div class="entry-content"><div class="message-text">${escapeHtml(classified.content)}</div></div>` : ''}
            ${metadata ? `<div class="metadata-toggle" onclick="toggleMeta('${entryId}', event)">+ metadata</div><div class="metadata-content" id="${entryId}-meta">${metadata}</div>` : ''}
          </div>
        `;
      }

      else if (classified.category === 'meta') {
        // Skip file-history-snapshot and similar meta entries by default
        return '';
      }

      else {
        // Unknown - render as system with raw JSON available
        html = `
          <div class="entry entry-system" data-entry-type="system">
            <div class="entry-header" onclick="toggleEntry(this)">
              <span class="role-badge role-system">Entry #${index + 1}</span>
              <span class="entry-meta" title="${escapeHtml(timestamp.full)}">${escapeHtml(timestamp.short)}</span>
              <button class="copy-btn" onclick="copyRaw(${index}, event)">copy</button>
              <span class="collapse-indicator">click to toggle</span>
            </div>
            <div class="metadata-toggle" onclick="toggleMeta('${entryId}', event)">+ raw data</div>
            <div class="metadata-content" id="${entryId}-meta"><pre>${escapeHtml(JSON.stringify(obj, null, 2))}</pre></div>
          </div>
        `;
      }

      return html;
    }

    window.toggleMeta = function(id, event) {
      event.stopPropagation();
      const el = document.getElementById(id + '-meta');
      const toggle = el.previousElementSibling;
      if (el.classList.contains('show')) {
        el.classList.remove('show');
        toggle.textContent = '+ metadata';
      } else {
        el.classList.add('show');
        toggle.textContent = '− metadata';
      }
    };

    window.toggleEntry = function(el) {
      const entry = el.closest('.entry');
      if (entry) {
        entry.classList.toggle('collapsed');
      }
    };

    window.copyRaw = function(index, event) {
      event.stopPropagation();
      const entry = parsedEntries[index];
      if (!entry) return;

      const text = JSON.stringify(entry, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'json';
          btn.classList.remove('copied');
        }, 1500);
      });
    };

    window.toggleWrap = function(btn, event) {
      event.stopPropagation();
      const entry = btn.closest('.entry');
      const toolInput = entry.querySelector('.tool-input');
      if (toolInput) {
        toolInput.classList.toggle('wrap');
        btn.classList.toggle('active');
        btn.textContent = toolInput.classList.contains('wrap') ? 'nowrap' : 'wrap';
      }
    };

    window.copyContent = function(index, event) {
      event.stopPropagation();
      const entry = parsedEntries[index];
      if (!entry) return;

      // Extract the actual content text
      let text = '';

      // Agent result - get from toolUseResult.content or message.content[].content
      if (entry.toolUseResult && entry.toolUseResult.content) {
        text = entry.toolUseResult.content
          .filter(b => b.type === 'text')
          .map(b => b.text)
          .join('\n');
      } else if (entry.message && entry.message.content) {
        // Try to extract from message.content
        const content = entry.message.content;
        if (typeof content === 'string') {
          text = content;
        } else if (Array.isArray(content)) {
          // Could be tool_result with nested content
          for (const block of content) {
            if (block.type === 'text') {
              text += block.text + '\n';
            } else if (block.type === 'tool_result' && block.content) {
              if (typeof block.content === 'string') {
                text += block.content + '\n';
              } else if (Array.isArray(block.content)) {
                text += block.content
                  .filter(b => b.type === 'text')
                  .map(b => b.text)
                  .join('\n') + '\n';
              }
            }
          }
        }
      } else if (entry.content) {
        text = typeof entry.content === 'string' ? entry.content : JSON.stringify(entry.content, null, 2);
      }

      navigator.clipboard.writeText(text.trim()).then(() => {
        const btn = event.target;
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    };

    function parseJSONL(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      const out = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        try {
          out.push(JSON.parse(line));
        } catch (err) {
          throw new Error(`Line ${i + 1}: ${err.message}`);
        }
      }
      return out;
    }

    function renderAll(items) {
      if (items.length === 0) {
        outputEl.innerHTML = '<div class="empty-state">No entries found</div>';
        return;
      }
      outputEl.innerHTML = items.map((item, i) => renderEntry(item, i)).join('');
      applyFilter();
    }

    parseBtn.addEventListener('click', () => {
      errorEl.textContent = '';
      try {
        parsedEntries = parseJSONL(inputEl.value);
        renderAll(parsedEntries);
        statusEl.textContent = `${parsedEntries.length} entries`;
        // Auto-collapse input after successful parse
        inputSection.classList.add('collapsed');
        toggleInputBtn.textContent = 'Show Input';
      } catch (err) {
        outputEl.innerHTML = '<div class="empty-state">Parse error</div>';
        statusEl.textContent = '';
        errorEl.textContent = err.message;
      }
    });

    clearBtn.addEventListener('click', () => {
      inputEl.value = '';
      outputEl.innerHTML = '<div class="empty-state">Paste Claude Code session JSONL and click Parse</div>';
      statusEl.textContent = '';
      errorEl.textContent = '';
      parsedEntries = [];
    });

    // === Server Mode (session browser + live tailing) ===
    let serverAvailable = false;
    let currentSessionId = null;
    let eventSource = null;
    let allSessions = [];

    function setView(view, title, fullTitle) {
      const backBtn = document.getElementById('backBtn');
      const filterGroup = document.getElementById('filterGroup');
      const liveDot = document.getElementById('liveDot');
      const sessionBrowser = document.getElementById('sessionBrowser');
      const sessionTitle = document.getElementById('sessionTitle');
      const viewerBookmark = document.getElementById('viewerBookmark');

      if (view === 'sessions') {
        backBtn.style.display = 'none';
        filterGroup.style.display = 'none';
        liveDot.classList.remove('active');
        sessionBrowser.classList.add('active');
        inputSection.style.display = 'none';
        outputEl.style.display = 'none';
        toggleInputBtn.style.display = 'none';
        sessionTitle.textContent = '';
        viewerBookmark.style.display = 'none';
        disconnectSSE();
      } else if (view === 'viewer') {
        backBtn.style.display = '';
        filterGroup.style.display = '';
        liveDot.classList.add('active');
        sessionBrowser.classList.remove('active');
        inputSection.style.display = 'none';
        outputEl.style.display = '';
        toggleInputBtn.textContent = 'Paste JSONL';
        toggleInputBtn.style.display = '';
        sessionTitle.textContent = title ? '/ ' + title : '';
        sessionTitle.title = fullTitle || title || '';
        // Show viewer bookmark star
        const uid = location.hash.slice(1);
        const starred = uid && isBookmarked(uid);
        viewerBookmark.style.display = '';
        viewerBookmark.classList.toggle('active', starred);
        viewerBookmark.innerHTML = starred ? '&#9733;' : '&#9734;';
        viewerBookmark.title = starred ? 'Remove bookmark' : 'Bookmark this session';
      } else { // paste
        backBtn.style.display = serverAvailable ? '' : 'none';
        filterGroup.style.display = '';
        liveDot.classList.remove('active');
        sessionBrowser.classList.remove('active');
        inputSection.style.display = '';
        inputSection.classList.remove('collapsed');
        outputEl.style.display = '';
        toggleInputBtn.textContent = 'Hide Input';
        toggleInputBtn.style.display = '';
        viewerBookmark.style.display = 'none';
        disconnectSSE();
      }
    }

    window.showSessionList = function() {
      history.replaceState(null, '', location.pathname);
      disconnectSSE();
      parsedEntries = [];
      outputEl.innerHTML = '';
      statusEl.textContent = '';
      setView('sessions');
      // Refresh the list
      fetch('/api/sessions').then(r => r.json()).then(sessions => {
        allSessions = sessions;
        filterSessions();
      }).catch(() => {});
    };

    window.filterSessions = function() {
      const query = (document.getElementById('sessionSearch')?.value || '').toLowerCase();
      const bookmarks = getBookmarks();
      const filtered = allSessions.filter(s => {
        if (showOnlyBookmarked && !bookmarks.includes(s.uid)) return false;
        const text = [s.summary || '', s.firstMessage || '', s.projectPath || ''].join(' ').toLowerCase();
        return !query || text.includes(query);
      });

      const list = document.getElementById('sessionList');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="session-empty">${showOnlyBookmarked ? 'No bookmarked sessions' : 'No sessions found'}</div>`;
        return;
      }

      list.innerHTML = filtered.map(s => {
        const title = escapeHtml(s.summary || (s.firstMessage ? s.firstMessage.slice(0, 200) : 'Untitled session'));
        const detail = s.firstMessage && s.summary ? escapeHtml(s.firstMessage.slice(0, 240)) : '';
        const project = escapeHtml(s.projectPath.split('/').slice(-2).join('/'));
        const ago = timeAgo(s.lastModified);
        const starred = bookmarks.includes(s.uid);
        return `
          <div class="session-card" onclick="openSession('${s.id}')">
            <div class="session-title-row">
              <div class="session-title">${title}</div>
              <span class="bookmark-star ${starred ? 'active' : ''}" onclick="toggleSessionBookmark('${s.uid}', event)" title="${starred ? 'Remove bookmark' : 'Bookmark'}">${starred ? '&#9733;' : '&#9734;'}</span>
            </div>
            ${detail ? `<div class="session-detail">${detail}</div>` : ''}
            <div class="session-meta-row">
              <span>${project}</span>
              <span>${s.lineCount} lines</span>
              <span>${ago}</span>
            </div>
          </div>
        `;
      }).join('');
    };

    function timeAgo(ms) {
      const diff = Date.now() - ms;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    window.openSession = async function(id) {
      const session = allSessions.find(s => s.id === id);
      location.hash = session?.uid || id;
      const fullTitle = session?.summary || session?.firstMessage || 'Session';
      setView('viewer', fullTitle.length > 60 ? fullTitle.slice(0, 60) + '...' : fullTitle, fullTitle);
      outputEl.innerHTML = '<div class="empty-state">Loading session...</div>';

      try {
        const res = await fetch('/api/session/' + id + '/content');
        const data = await res.json();

        parsedEntries = parseJSONL(data.content);
        renderAll(parsedEntries);
        statusEl.textContent = parsedEntries.length + ' entries';

        // Restore scroll position or scroll to bottom
        const savedScroll = sessionStorage.getItem('scroll:' + (session?.uid || id));
        if (savedScroll != null) {
          outputEl.scrollTop = parseInt(savedScroll, 10);
          sessionStorage.removeItem('scroll:' + (session?.uid || id));
        } else {
          outputEl.scrollTop = outputEl.scrollHeight;
        }

        // Connect SSE for live updates
        connectSSE(id, data.byteLength);
      } catch (err) {
        outputEl.innerHTML = '<div class="empty-state">Error loading session</div>';
      }
    };

    function connectSSE(id, offset) {
      disconnectSSE();
      currentSessionId = id;

      eventSource = new EventSource('/api/session/' + id + '/stream?offset=' + offset);

      eventSource.onmessage = function(event) {
        const line = JSON.parse(event.data);
        try {
          const obj = JSON.parse(line);
          const index = parsedEntries.length;
          parsedEntries.push(obj);

          const html = renderEntry(obj, index);
          if (html) {
            const wasAtBottom = outputEl.scrollHeight - outputEl.scrollTop - outputEl.clientHeight < 50;
            outputEl.insertAdjacentHTML('beforeend', html);
            applyFilter();
            if (wasAtBottom) {
              outputEl.scrollTop = outputEl.scrollHeight;
            }
          }
          statusEl.textContent = parsedEntries.length + ' entries';
        } catch {}
      };

      eventSource.onerror = function() {
        document.getElementById('liveDot')?.classList.remove('active');
      };
    }

    function disconnectSSE() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      currentSessionId = null;
    }

    // Override toggleInput for server mode
    toggleInputBtn.addEventListener('click', function() {
      if (serverAvailable && inputSection.style.display === 'none') {
        // Switch to paste mode
        setView('paste');
        return;
      }
    }, true);

    // Detect server on load
    (async function() {
      try {
        const res = await fetch('/api/sessions');
        if (res.ok) {
          serverAvailable = true;
          allSessions = await res.json();
          const hashUid = location.hash.slice(1);
          const hashSession = hashUid && allSessions.find(s => s.uid === hashUid);
          if (hashSession) {
            openSession(hashSession.id);
          } else {
            setView('sessions');
            filterSessions();
          }
        }
      } catch {
        // No server available - stay in paste mode
      }
    })();

    window.addEventListener('beforeunload', () => {
      const uid = location.hash.slice(1);
      if (uid) sessionStorage.setItem('scroll:' + uid, outputEl.scrollTop);
    });

    // Bookmark: toggle on session card star
    window.toggleSessionBookmark = function(uid, event) {
      event.stopPropagation();
      toggleBookmark(uid);
      filterSessions();
    };

    // Bookmark: toggle saved filter
    window.toggleSavedFilter = function() {
      showOnlyBookmarked = !showOnlyBookmarked;
      document.getElementById('savedFilterBtn').classList.toggle('active', showOnlyBookmarked);
      filterSessions();
    };

    // Bookmark: viewer header star
    window.toggleViewerBookmark = function() {
      const uid = location.hash.slice(1);
      if (!uid) return;
      const nowBookmarked = toggleBookmark(uid);
      const el = document.getElementById('viewerBookmark');
      el.classList.toggle('active', nowBookmarked);
      el.innerHTML = nowBookmarked ? '&#9733;' : '&#9734;';
      el.title = nowBookmarked ? 'Remove bookmark' : 'Bookmark this session';
    };

    // Restart server (launchd will auto-restart it)
    window.restartServer = function() {
      fetch('/api/restart', {
        method: 'POST'
      }).catch(() => {});
      document.title = 'Restarting...';
      setTimeout(() => location.reload(), 1500);
    };
  </script>
</body>
</html>
